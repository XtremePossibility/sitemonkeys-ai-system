name: Sync Code to Google Drive

on:
  push:
    branches: [main, master]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: 🔍 Debug: Confirm file location
      run: |
        echo "Current directory:"
        pwd
        echo "Listing contents:"
        ls -al

    - name: Sync to Google Drive
      working-directory: ./  # stays at top level
      env:
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
      run: |
        if [ -f sync_to_drive.py ]; then
          echo "✅ Found sync_to_drive.py"
          python sync_to_drive.py
        else
          echo "❌ sync_to_drive.py not found in this directory"
          exit 1
        fi
