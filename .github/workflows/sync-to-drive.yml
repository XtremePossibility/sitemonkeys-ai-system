from googleapiclient.http import MediaFileUpload

# ... earlier setup code unchanged ...

for file_path in all_files:
    filename = f"CODE_{os.path.basename(file_path)}"
    print(f"Uploading {file_path} as raw file {filename}")
    
    try:
        # Prepare metadata
        file_metadata = {
            'name': filename,
            'parents': [shared_drive_id],  # or remove if uploading to My Drive
        }

        media = MediaFileUpload(file_path, mimetype='text/plain')

        # Check for existing file with same name
        query = f"name='{filename}' and '{shared_drive_id}' in parents"
        existing = drive_service.files().list(
            q=query,
            spaces='drive',
            fields='files(id, name)',
            supportsAllDrives=True
        ).execute().get('files', [])

        if existing:
            file_id = existing[0]['id']
            print(f"Updating existing raw file: {filename}")
            drive_service.files().update(
                fileId=file_id,
                media_body=media,
                supportsAllDrives=True
            ).execute()
        else:
            drive_service.files().create(
                body=file_metadata,
                media_body=media,
                supportsAllDrives=True
            ).execute()
            print(f"Created new raw file: {filename}")
        
        uploaded_count += 1

    except Exception as e:
        print(f"Error uploading raw file {file_path}: {e}")
