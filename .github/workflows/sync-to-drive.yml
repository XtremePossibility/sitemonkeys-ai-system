name: Sync Code to Google Drive

on:
  push:
    branches: [ main, master ]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
    - name: Sync to Google Drive
      env:
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
      run: |
        cat > sync_to_drive.py << 'EOF'
        import os
        import json
        from googleapiclient.discovery import build
        from googleapiclient.http import MediaFileUpload
        from google.oauth2.service_account import Credentials
        
        # Parse credentials
        creds_json = os.environ['GOOGLE_DRIVE_CREDENTIALS']
        creds_info = json.loads(creds_json)
        creds = Credentials.from_service_account_info(creds_info)
        
        # Build Drive service
        service = build('drive', 'v3', credentials=creds)
        
        # Shared drive ID
        shared_drive_id = '1HmKCowIi62M2ajoEjcepRNbN1M4lRKee'
        print(f"Using shared drive: {shared_drive_id}")
        
        # Test shared drive access first
        try:
            drive_info = service.files().get(
                fileId=shared_drive_id,
                supportsAllDrives=True
            ).execute()
            print(f"Shared drive access confirmed: {drive_info.get('name', 'Unknown')}")
        except Exception as e:
            print(f"Cannot access shared drive: {e}")
            exit(1)
        
        # Upload API files
        import glob
        
        file_patterns = ['api/**/*.js']
        all_files = []
        for pattern in file_patterns:
            all_files.extend(glob.glob(pattern, recursive=True))
        
        print(f"Found {len(all_files)} API files to upload")
        
        for file_path in all_files:
            filename = os.path.basename(file_path)
            print(f"Uploading {file_path} as {filename}")
            
            # Simplified file check - just search by name
            file_query = f"name='{filename}' and parents in '{shared_drive_id}'"
            try:
                existing_files = service.files().list(
                    q=file_query,
                    supportsAllDrives=True,
                    includeItemsFromAllDrives=True
                ).execute().get('files', [])
            except Exception as e:
                print(f"Error checking for existing file: {e}")
                existing_files = []
            
            media = MediaFileUpload(file_path, mimetype='text/javascript')
            
            if existing_files:
                # Update existing file
                file_id = existing_files[0]['id']
                try:
                    service.files().update(
                        fileId=file_id, 
                        media_body=media,
                        supportsAllDrives=True
                    ).execute()
                    print(f"Updated existing file: {filename}")
                except Exception as e:
                    print(f"Error updating file: {e}")
            else:
                # Create new file in shared drive
                file_metadata = {
                    'name': filename,
                    'parents': [shared_drive_id]
                }
                try:
                    service.files().create(
                        body=file_metadata, 
                        media_body=media,
                        supportsAllDrives=True
                    ).execute()
                    print(f"Created new file: {filename}")
                except Exception as e:
                    print(f"Error creating file: {e}")
        
        print("Sync completed!")
        EOF
        
        python sync_to_drive.py
