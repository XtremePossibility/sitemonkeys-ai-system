name: Sync Code to Google Drive

on:
  push:
    branches: [ main, master ]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
    - name: Sync to Google Drive
      env:
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
      run: |
        cat > sync_to_drive.py << 'EOF'
        import os
        import json
        from googleapiclient.discovery import build
        from googleapiclient.http import MediaFileUpload
        from google.oauth2.service_account import Credentials
        
        # Parse credentials
        creds_json = os.environ['GOOGLE_DRIVE_CREDENTIALS']
        creds_info = json.loads(creds_json)
        creds = Credentials.from_service_account_info(creds_info)
        
        # Build Drive service
        service = build('drive', 'v3', credentials=creds)
        
        # Use shared drive directly - no need to create folder
        shared_drive_id = '1HmKCowIi62M2ajoEjcepRNbN1M4lRKee'
        print(f"Using shared drive: {shared_drive_id}")
        
        # Upload all JavaScript and other important files
        import glob
        
        # Get all important file types
        file_patterns = ['**/*.js', '**/*.json', '**/*.md', '**/*.css', '**/*.html']
        all_files = []
        for pattern in file_patterns:
            all_files.extend(glob.glob(pattern, recursive=True))
        
        # Skip certain files/folders
        skip_patterns = ['node_modules/', '.git/', 'dist/', 'build/']
        filtered_files = []
        for file_path in all_files:
            skip = False
            for skip_pattern in skip_patterns:
                if skip_pattern in file_path:
                    skip = True
                    break
            if not skip:
                filtered_files.append(file_path)
        
        print(f"Found {len(filtered_files)} files to upload")
        
        for file_path in filtered_files:
            # Create a meaningful filename with path info
            filename = file_path.replace('/', '_').replace('\\', '_')
            print(f"Uploading {file_path} as {filename}")
            
            # Check if file exists in shared drive
            file_query = f"name='{filename}' and parents in '{shared_drive_id}'"
            existing_files = service.files().list(
                q=file_query,
                supportsAllDrives=True,
                includeItemsFromAllDrives=True
            ).execute().get('files', [])
            
            # Determine MIME type based on file extension
            if file_path.endswith('.js'):
                mime_type = 'text/javascript'
            elif file_path.endswith('.json'):
                mime_type = 'application/json'
            elif file_path.endswith('.css'):
                mime_type = 'text/css'
            elif file_path.endswith('.html'):
                mime_type = 'text/html'
            elif file_path.endswith('.md'):
                mime_type = 'text/markdown'
            else:
                mime_type = 'text/plain'
            
            media = MediaFileUpload(file_path, mimetype=mime_type)
            
            if existing_files:
                # Update existing file
                file_id = existing_files[0]['id']
                service.files().update(
                    fileId=file_id, 
                    media_body=media,
                    supportsAllDrives=True
                ).execute()
                print(f"Updated existing file: {filename}")
            else:
                # Create new file in shared drive
                file_metadata = {
                    'name': filename,
                    'parents': [shared_drive_id]
                }
                service.files().create(
                    body=file_metadata, 
                    media_body=media,
                    supportsAllDrives=True
                ).execute()
                print(f"Created new file: {filename}")
        
        print("Sync completed successfully!")
        EOF
        
        python sync_to_drive.py
