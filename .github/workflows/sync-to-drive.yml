name: Sync Code to Google Drive

on:
  push:
    branches: [ main, master ]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
    - name: Sync to Google Drive
      env:
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
      run: |
        cat > sync_to_drive.py << 'EOF'
        import os
        import json
        from googleapiclient.discovery import build
        from googleapiclient.http import MediaFileUpload
        from google.oauth2.service_account import Credentials
        
        # Parse credentials
        creds_json = os.environ['GOOGLE_DRIVE_CREDENTIALS']
        creds_info = json.loads(creds_json)
        creds = Credentials.from_service_account_info(creds_info)
        
        # Build Drive service with domain-wide delegation
        service = build('drive', 'v3', credentials=creds)
        
        # Shared drive ID
        shared_drive_id = '1HmKCowIi62M2ajoEjcepRNbN1M4lRKee'
        print(f"Using shared drive: {shared_drive_id}")
        
        # Upload API files directly without checking for existing files first
        import glob
        
        file_patterns = ['api/**/*.js']
        all_files = []
        for pattern in file_patterns:
            all_files.extend(glob.glob(pattern, recursive=True))
        
        print(f"Found {len(all_files)} API files to upload")
        
        uploaded_count = 0
        for file_path in all_files:
            filename = f"{file_path.replace('/', '_').replace('api_', '')}"
            print(f"Uploading {file_path} as {filename}")
            
            try:
                # Read file content as text and upload as Google Doc instead of file
                with open(file_path, 'r', encoding='utf-8') as f:
                    file_content = f.read()
                
                # Create as Google Doc (no storage quota for Docs)
                doc_metadata = {
                    'name': filename,
                    'parents': [shared_drive_id],
                    'mimeType': 'application/vnd.google-apps.document'
                }
                
                # Create the document
                doc = service.files().create(
                    body=doc_metadata,
                    supportsAllDrives=True
                ).execute()
                
                print(f"Created Google Doc: {filename} (ID: {doc['id']})")
                
                # Insert the code content into the document
                docs_service = build('docs', 'v1', credentials=creds)
                requests = [
                    {
                        'insertText': {
                            'location': {'index': 1},
                            'text': file_content
                        }
                    }
                ]
                
                docs_service.documents().batchUpdate(
                    documentId=doc['id'],
                    body={'requests': requests}
                ).execute()
                
                print(f"Added content to document: {filename}")
                uploaded_count += 1
                
            except Exception as e:
                print(f"Error uploading {file_path}: {e}")
                continue
        
        print(f"Successfully uploaded {uploaded_count} files as Google Docs!")
        print("Files are now accessible in the shared drive as Google Docs.")
        EOF
        
        python sync_to_drive.py
