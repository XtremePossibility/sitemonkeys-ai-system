name: Sync to Google Drive
on:
  push:
    paths:
      - 'api/**'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Sync to Google Drive
        uses: satackey/action-google-drive@v1
        with:
          skicka-tokencache-json: ${{ secrets.GOOGLE_DRIVE_TOKEN }}
          upload-from: './api'
          upload-to: '/Site Monkeys Code'
