<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Monkeys AI</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: white;
    }

    header {
      background: black;
      padding: 10px;
      text-align: center;
    }

    header img.logo {
      height: 100px;
    }

    .rocket-top {
      position: absolute;
      top: 10px;
      right: 20px;
      width: 100px;
    }

    .main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px;
      flex-wrap: wrap;
    }

    .sidebar {
      width: 25%;
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    .sidebar h3 {
      color: #ffd700;
      margin-bottom: 10px;
    }

    .status-list {
      list-style: none;
      padding-left: 0;
    }

    .status-list li::before {
      content: "✅ ";
      color: #00ff00;
    }

    .mascot-large {
      width: 250px;
      margin-bottom: 20px;
    }

    .chat-wrapper {
      flex: 1;
      background: #2a2a2a;
      border: 3px solid white;
      border-radius: 10px;
      padding: 20px;
      margin: 0 20px;
      display: flex;
      flex-direction: column;
      max-width: 800px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      height: 400px;
    }

    .bubble {
      display: flex;
      align-items: flex-start;
      margin: 10px 0;
      max-width: 80%;
    }

    .bubble img.avatar {
      width: 40px;
      height: 40px;
      margin-right: 10px;
    }

    .bubble.roxy {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .bubble.roxy img.avatar {
      margin-left: 10px;
      margin-right: 0;
    }

    .bubble-content {
      background: #ffd700;
      color: #000;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 1em;
    }

    .bubble.roxy .bubble-content {
      background: #b38eff;
    }

    .input-area {
      display: flex;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 12px;
      font-size: 1em;
      border-radius: 20px;
      border: none;
    }

    .send-button {
      background: #ffd700;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      margin-left: 10px;
      display: flex;
      align-items: center;
    }

    .send-button img {
      height: 20px;
      margin-left: 8px;
    }

    .mascot-right {
      width: 250px;
    }

    @media (max-width: 768px) {
      .main {
        flex-direction: column;
        align-items: center;
      }

      .sidebar,
      .chat-wrapper {
        width: 90%;
        margin: 10px 0;
      }

      .mascot-large,
      .mascot-right {
        width: 160px;
      }

      .rocket-top {
        width: 60px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Site Monkeys Logo" class="logo" />
  </header>

  <!-- 🚀 Rocket top-right -->
  <img src="rocket-no-smoke.png" alt="Rocket" class="rocket-top" />

  <div class="main">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <img src="boy-mascot.png" alt="Eli" class="mascot-large" />
      <h3>Status Panel</h3>
      <ul class="status-list">
        <li>Vault memory loaded</li>
        <li>Tokens active</li>
        <li>Zero-Failure Protocol</li>
        <li>Business Logic Online</li>
        <li>Pricing Frameworks Loaded</li>
        <li>EnforcementShell verified</li>
        <li>Roxy/Eli Intelligence Synced</li>
      </ul>
      <div id="vault-status" style="margin-top: 10px; color: #ccc;">
        📊 Tokens: <span id="token-count">—</span><br>
        💰 Cost: <span id="cost-estimate">—</span>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-wrapper">
      <div class="chat-box" id="chat-box">
        <div class="bubble eli">
          <img src="boy-mascot.png" class="avatar" />
          <div class="bubble-content"><strong>Eli:</strong> Welcome to Site Monkeys. Ready to validate something?</div>
        </div>
      </div>

      <div class="input-area">
        <input type="text" class="chat-input" id="user-input" placeholder="Ask something..." />
        <button class="send-button" onclick="sendMessage()">
          Send <img src="rocket-no-smoke.png" alt="Send Rocket" />
        </button>
      </div>
    </div>

    <!-- Right Mascot -->
    <img src="girl-mascot.png" alt="Roxy" class="mascot-right" />
  </div>
  <script>
    let toggle = true;

    function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      const box = document.getElementById('chat-box');
      const bubble = document.createElement('div');
      const isRoxy = toggle;
      const who = isRoxy ? 'Roxy' : 'Eli';
      const avatar = isRoxy ? 'girl-mascot.png' : 'boy-mascot.png';
      const bubbleClass = isRoxy ? 'bubble roxy' : 'bubble eli';

      bubble.className = bubbleClass;
      bubble.innerHTML = `
        <img src="${avatar}" class="avatar" />
        <div class="bubble-content"><strong>${who}:</strong> ${text}</div>
      `;

      box.appendChild(bubble);
      box.scrollTop = box.scrollHeight;
      input.value = '';
      toggle = !toggle;
    }

    // Simulate token + cost updates
    function updateVaultStatus() {
      const tokenCount = Math.floor(Math.random() * 30000 + 10000);
      const costEstimate = ((tokenCount / 1000) * 0.02).toFixed(2);

      document.getElementById('token-count').textContent = `${tokenCount.toLocaleString()} tokens`;
      document.getElementById('cost-estimate').textContent = `$${costEstimate}`;
    }

    // Simulate vault loading check
    function checkVault() {
      const vaultLoaded = true; // toggle this to false to simulate failure

      if (!vaultLoaded) {
        const box = document.getElementById('chat-box');
        const errorMsg = document.createElement('div');
        errorMsg.className = "bubble-content";
        errorMsg.style.color = 'red';
        errorMsg.style.background = 'black';
        errorMsg.style.margin = '10px auto';
        errorMsg.innerHTML = "<strong>⚠️ My Environment has left me Retarded</strong>";
        box.appendChild(errorMsg);
      }
    }

    window.onload = () => {
      updateVaultStatus();
      checkVault();
    };
  </script>
</body>
</html>
